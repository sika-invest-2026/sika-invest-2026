name: Mise à jour quotidienne BRVM

on:
  schedule:
    - cron: '30 17 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lancer le scraper
        run: node scraper.js

      - name: Commit & push
        run: |
          git config user.name  "sika-bot"
          git config user.email "bot@sika-invest.com"
          git add data/daily-data.js data/history.json
          git diff --staged --quiet || git commit -m "Auto-update BRVM $(date '+%d/%m/%Y %H:%M')"
          git push
